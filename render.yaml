services:
  # 1. Backend Web Service (Spring Boot Docker)
  - type: web
    name: champion-sports-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-shiny-bonus-attz75v3.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        value: npg_dcJAOqzfL26u
      - key: PORT
        value: 8080
      - key: ML_SERVICE_URL
        value: https://champion-sports-ml.onrender.com

  # 2. Frontend Web Service (React Static Site)
  - type: web
    name: champion-sports-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Support Single Page App Routing (redirect all routes to index.html)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://champion-sports-backend.onrender.com
      - key: VITE_WS_BASE_URL
        value: wss://champion-sports-backend.onrender.com

  # 3. ML Web Service (Python FastAPI)
  - type: web
    name: champion-sports-ml
    env: python
    rootDir: ml-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
