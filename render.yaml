databases:
  - name: champion-sports-db
    databaseName: champion_sports
    plan: free

services:
  # 1. Backend Web Service (Spring Boot Docker)
  - type: web
    name: champion-sports-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: champion-sports-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: champion-sports-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: champion-sports-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: champion-sports-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: champion-sports-db
          property: password
      - key: PORT
        value: 8080
      - key: ML_SERVICE_URL
        value: https://champion-sports-ml.onrender.com

  # 2. Frontend Static Site (React)
  - type: web
    name: champion-sports-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://champion-sports-backend.onrender.com
      - key: VITE_WS_BASE_URL
        value: wss://champion-sports-backend.onrender.com

  # 3. ML Web Service (Python FastAPI)
  - type: web
    name: champion-sports-ml
    runtime: python
    rootDir: ml-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
